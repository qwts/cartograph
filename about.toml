# cargo-about configuration (#222): generates the Rust half of
# THIRD-PARTY-NOTICES.md. Run via `node scripts/generate-notices.mjs`.
#
# `accepted` mirrors the allow-list in deny.toml — cargo-about fails if a crate
# resolves to a license outside this set, giving us a second, independent gate.
# Cartograph ships a macOS universal bundle (`npm run package:macos`). Pin the
# graph to those targets so the notices describe exactly what ships AND are
# byte-identical whether generated on a macOS dev box or Linux CI — otherwise
# the drift-check would flip on host-specific crates (gtk on Linux, etc.).
targets = ["x86_64-apple-darwin", "aarch64-apple-darwin"]

accepted = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]

# Notices cover crates whose code SHIPS in the binary: runtime deps (incl.
# transitive), not build-time-only tools (proc-macros, build scripts) or dev
# deps. Excluding build deps is both correct for a distribution notice and
# keeps output host-independent (build scripts resolve per build platform).
ignore-build-dependencies = true
ignore-dev-dependencies = true
ignore-transitive-dependencies = false
