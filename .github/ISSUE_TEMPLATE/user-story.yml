name: User story
description: A user story following the US/AC schema in docs/user_stories.md
title: "US-XXXX — "
labels: ["story"]
body:
  - type: markdown
    attributes:
      value: |
        Stories are canonical in `docs/user_stories.md`; this issue tracks the work.
        Use the next free US/AC numbers and add the story + a US-TM row in the same PR
        that implements it (or a docs PR that lands first).
  - type: input
    id: actor
    attributes:
      label: Actor
      placeholder: Engineer | Engine
    validations:
      required: true
  - type: textarea
    id: narrative
    attributes:
      label: Narrative
      placeholder: "As a … I want … so that …"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority (MoSCoW)
      options:
        - Must
        - Should
        - Could
        - Won't (this release)
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: One per line, Given/When/Then, numbered AC-XXXX.
      placeholder: |
        AC-XXXX Given …, when …, then …
    validations:
      required: true
  - type: textarea
    id: security-performance
    attributes:
      label: Security / Performance notes
      description: Security and performance facts are mapped onto the owning US/AC.
  - type: input
    id: trace
    attributes:
      label: Trace
      placeholder: "Milestone · crate(s) · Flow? · Test IDs (T-XXXX..)"
