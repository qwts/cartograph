# cargo-deny configuration (#222): license compliance + supply-chain gate.
# Run locally with `cargo deny check`; CI runs the same on every PR.
#
# The license model is an ALLOW-LIST: any SPDX license not listed below fails
# the build. This is how we keep copyleft/network-copyleft licenses
# (GPL/AGPL/SSPL/…) out of a source-available, commercially-licensable product
# — they are denied by omission, not by an explicit deny list.

[graph]
all-features = true

[advisories]
version = 2
# RustSec advisory DB. Yanked crates and known *vulnerabilities* always fail
# the gate. `unmaintained = "workspace"` scopes unmaintained-crate notices to
# our own crates and their direct deps — the GTK3/unic/proc-macro-error
# unmaintained crates are pulled purely transitively through Tauri's Linux
# webkit stack and are not actionable by us, so they don't block CI.
yanked = "deny"
unmaintained = "workspace"
ignore = [
  # Add advisory IDs here only with a written justification + tracking issue.
]

[licenses]
version = 2
# Our own workspace crates are `publish = false` and carry the PolyForm
# Noncommercial license; skip them so the allow-list only governs third-party
# dependencies.
private = { ignore = true }
# Confidence below this on the license-text match is treated as "unknown".
confidence-threshold = 0.9
# The allow-list carries a few common licenses not yet in the tree as
# future-proofing; don't warn when one is currently unused.
unused-allowed-license = "allow"
# Permissive + weak-copyleft (file-level) licenses that are safe to ship in a
# proprietary/commercial distribution. Keep alphabetized.
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "OpenSSL",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Unlicense",
  "Zlib",
]

# Per-crate exceptions: a crate whose declared expression is not fully covered
# by `allow`, but whose actual terms are acceptable. Add with justification.
exceptions = []

[bans]
multiple-versions = "warn"
# Deny real `version = "*"` crates.io deps, but allow our internal workspace
# crates, which are path deps and therefore intentionally version-less.
wildcards = "deny"
allow-wildcard-paths = true
# Deny crates known to be problematic here. Empty for now.
deny = []

[sources]
# Only crates.io and first-party git are trusted.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
