name: CI

on:
  # Version-cut explicitly dispatches CI after refreshing the bot-managed
  # Version packages branch because GITHUB_TOKEN PR updates do not emit a
  # pull_request event.
  workflow_dispatch:
  pull_request:
    branches:
      - main
  # Post-merge signal: run the same gates on main so it can never sit red unnoticed.
  push:
    branches:
      - main

# Cancel superseded PR runs. Main-push runs are keyed by SHA so back-to-back merges each keep
# their own post-merge verdict instead of replacing one another in a shared ref group.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Keeps the spec, user stories, traceability matrix, and ADRs mutually
  # consistent on every PR.
  docs:
    name: Docs & traceability
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          # Single source of truth: CI and local resolve Node from the same .nvmrc.
          node-version-file: .nvmrc

      - name: Traceability check
        run: node scripts/check-traceability.mjs

      - name: Version synchronization check
        run: npm run version:check

      - name: Version tooling tests
        run: npm run test:version

      # Help single-sourcing (#155): docs/help/ and the wiki must be
      # identical; the wiki is public so the clone needs no token.
      - name: Help mirror drift check
        run: |
          git clone --depth 1 https://github.com/qwts/cartograph.wiki.git /tmp/wiki
          node scripts/check-help-mirror.mjs /tmp/wiki

  # Rust core: format, lint-as-error, tests. The pinned toolchain comes from
  # rust-toolchain.toml (rustup auto-installs it on first cargo call), so CI
  # and local always agree — bump the pin deliberately.
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Compiling the tauri crate on Linux needs the webkit/gtk dev stack.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Translate rustc/clippy diagnostics into GitHub annotations so a failed
      # run shows the actual error in the summary UI instead of a blank
      # "Error:" — matcher pairs the message line with its `--> file:line:col`.
      - name: Enable Rust problem matcher
        run: echo "::add-matcher::.github/rust-problem-matcher.json"

      # tauri's generate_context! macro requires the frontendDist directory to
      # exist at compile time; the Rust job must not depend on the Frontend job
      # for that (they run in parallel), so give it an empty placeholder.
      - name: Placeholder frontend dist
        run: mkdir -p ui/dist

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  # License compliance + supply-chain gate (#222). cargo-deny enforces the
  # allow-listed licenses and RustSec advisories. This is the license *gate*:
  # a new dep with a disallowed license (or a fresh RustSec advisory) fails the
  # build. THIRD-PARTY-NOTICES.md is regenerated at release time in package.yml
  # (the macOS build env that resolves the shipped apple-target graph), so it is
  # not byte-diff-checked here — cargo-about output is not reproducible across a
  # Linux runner and the macOS shipping target.
  compliance:
    name: License & supply-chain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.20.2

      # cargo-deny: licenses + advisories + bans + sources.
      - name: cargo-deny
        run: cargo deny check

  # Web UI: lint, typecheck, unit tests, production build.
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Story interaction tests run in headless Chromium via the vitest
      # browser provider (`npm run test` covers the unit + storybook projects).
      - name: Install Playwright browser (for story tests)
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
